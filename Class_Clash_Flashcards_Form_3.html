<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form 3 Music — Flashcard Drill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0822;--bg-hi:#2A1654;--board:#221141;
    --card1:#36206B;--card2:#1B0F3A;--chrome:#1A0E33;--chrome2:#271447;--border:#3A2A66;
    --accent:#C7E84A;--accent-bright:#E4FF5A;--ink:#152400;
    --white:#F4F1FA;--dim:#9A8FC4;--green:#54E0A0;--amber:#F4C84B;--red:#FF6F8E;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(circle at 50% -10%, var(--bg-hi) 0%, var(--bg) 62%);color:var(--white);font-family:"Inter",system-ui,sans-serif;min-height:100vh;padding:18px clamp(12px,3vw,28px) 40px;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}
  .display{font-family:"Barlow Condensed","Arial Narrow",sans-serif;}
  header{text-align:center;margin-bottom:14px;}
  .formtag{display:inline-block;font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--ink);background:var(--accent);padding:4px 16px;border-radius:999px;margin-bottom:10px;}
  header h1{font-family:"Barlow Condensed",sans-serif;font-weight:800;letter-spacing:.02em;text-transform:uppercase;font-size:clamp(26px,5vw,46px);line-height:.92;color:var(--white);}
  header h1 .acc{color:var(--accent-bright);}
  header .sub{color:var(--dim);font-size:12px;letter-spacing:.16em;text-transform:uppercase;margin-top:5px;}

  .wrap{max-width:760px;margin:0 auto;width:100%;flex:1;display:flex;flex-direction:column;}
  .toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;justify-content:center;margin-bottom:14px;}
  .btn{font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:13px;background:var(--chrome);color:var(--white);border:1px solid var(--border);padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px;}
  .btn:hover{border-color:var(--accent);color:var(--accent-bright);}
  .btn.on{border-color:var(--accent);color:var(--accent-bright);background:var(--chrome2);}
  select.src{font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:13px;background:var(--chrome);color:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;max-width:240px;}
  select.src:focus{outline:none;border-color:var(--accent);}

  .progress{max-width:760px;margin:0 auto 12px;width:100%;}
  .progress .meta{display:flex;justify-content:space-between;font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--dim);margin-bottom:6px;}
  .progress .meta b{color:var(--accent-bright);}
  .bar{height:7px;background:var(--chrome);border:1px solid var(--border);border-radius:99px;overflow:hidden;}
  .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-bright));transition:width .3s;}

  /* Card */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;perspective:1600px;min-height:340px;}
  .card{position:relative;width:100%;max-width:680px;aspect-ratio:3/2;cursor:pointer;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.2,.7,.2,1);}
  .card.flipped{transform:rotateY(180deg);}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;border:2px solid var(--border);padding:clamp(22px,5vw,46px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;box-shadow:0 22px 60px rgba(0,0,0,.55);}
  .face.front{background:linear-gradient(180deg,var(--card1) 0%, var(--card2) 100%);}
  .face.back{background:linear-gradient(180deg,#234a32 0%, #0f2b1c 100%);border-color:var(--green);transform:rotateY(180deg);}
  .chip{font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:13px;color:var(--accent-bright);margin-bottom:18px;}
  .face.back .chip{color:var(--green);}
  .prompt{font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.01em;font-size:clamp(20px,3.6vw,34px);line-height:1.12;color:var(--white);max-width:560px;}
  .tap{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-family:"Barlow Condensed",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.16em;font-size:11px;color:var(--dim);}
  .face.back .tap{color:#7fb89a;}

  .rate{max-width:680px;margin:18px auto 0;display:none;gap:10px;}
  .rate.show{display:flex;}
  .rate button{flex:1;font-family:"Barlow Condensed",sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:15px;padding:14px 8px;border-radius:11px;border:1px solid var(--border);background:var(--chrome);color:var(--white);cursor:pointer;transition:.13s;}
  .rate button small{display:block;font-size:10px;letter-spacing:.1em;color:var(--dim);margin-top:3px;font-weight:600;}
  .rate .miss:hover{border-color:var(--red);color:var(--red);}
  .rate .near:hover{border-color:var(--amber);color:var(--amber);}
  .rate .got:hover{border-color:var(--green);color:var(--green);}

  .hintbar{text-align:center;color:var(--dim);font-size:11px;letter-spacing:.05em;margin-top:14px;}
  .hintbar b{color:var(--accent);}

  /* Summary */
  .summary{display:none;max-width:560px;margin:10px auto 0;background:var(--card2);border:2px solid var(--accent);border-radius:16px;padding:30px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .summary.show{display:block;animation:pop .25s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .summary h2{font-family:"Barlow Condensed",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:32px;color:var(--accent-bright);margin-bottom:4px;}
  .summary p{color:var(--dim);font-size:14px;margin-bottom:20px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
  .stat{background:var(--chrome2);border:1px solid var(--border);border-radius:12px;padding:14px 8px;}
  .stat .n{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:30px;color:var(--white);line-height:1;}
  .stat .l{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:6px;}
  .summary .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .summary .btn.primary{background:var(--accent);color:var(--ink);border-color:var(--accent);}
  .summary .btn.primary:hover{background:var(--accent-bright);color:var(--ink);}

  @media(max-width:560px){.card{aspect-ratio:4/5;}.stats{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header>
  <span class="formtag">Form 3 · Music</span>
  <h1 class="display">Flashcard <span class="acc">Drill</span></h1>
  <div class="sub">Tap to flip · rate yourself · missed cards loop back</div>
</header>

<div class="wrap">
  <div class="toolbar">
    <select class="src" id="catSelect" onchange="restart()"><option value="ALL">All categories</option></select>
    <button class="btn on" id="shuffleBtn" onclick="toggleShuffle()">🔀 Shuffle</button>
    <button class="btn" id="muteBtn" onclick="toggleMute()">🔊 Sound</button>
    <button class="btn" onclick="restart()">↻ Restart</button>
  </div>

  <div class="progress">
    <div class="meta"><span><b id="mGo">0</b> to go</span><span><b id="mDone">0</b> mastered · <b id="mTotal">0</b> total</span></div>
    <div class="bar"><i id="barFill"></i></div>
  </div>

  <div class="stage" id="stage">
    <div class="card" id="card" onclick="flip()">
      <div class="face front"><div class="chip" id="frontChip"></div><div class="prompt" id="frontText"></div><div class="tap">Tap to flip</div></div>
      <div class="face back"><div class="chip">Answer</div><div class="prompt" id="backText"></div><div class="tap">How did you do?</div></div>
    </div>
  </div>

  <div class="rate" id="rate">
    <button class="miss" onclick="rate('miss')">Missed<small>see it again soon</small></button>
    <button class="near" onclick="rate('near')">Nearly<small>see it later</small></button>
    <button class="got" onclick="rate('got')">Got it<small>master it</small></button>
  </div>

  <div class="hintbar"><b>Space</b> flip · <b>1</b> missed · <b>2</b> nearly · <b>3</b> got it</div>

  <div class="summary" id="summary">
    <h2 id="sumTitle">Deck complete!</h2>
    <p id="sumSub"></p>
    <div class="stats">
      <div class="stat"><div class="n" id="sCards">0</div><div class="l">Cards mastered</div></div>
      <div class="stat"><div class="n" id="sFirst">0%</div><div class="l">First-try recall</div></div>
      <div class="stat"><div class="n" id="sAttempts">0</div><div class="l">Total flips</div></div>
    </div>
    <div class="row">
      <button class="btn primary" onclick="restart()">↻ Study again</button>
      <button class="btn" onclick="studyTough()">Review tough cards</button>
    </div>
  </div>
</div>

}, {"cat": "Song Structures", "front": "The form that repeats the same music for each verse or stanza (A A A A).", "back": "What is Strophic form?", "level": 4}, {"cat": "Song Structures", "front": "The structure of Rondo form, where a main theme keeps returning.", "back": "What is A B A C A?", "level": 5}, {"cat": "Harmony Potpourri", "front": "How dissonant intervals usually sound.", "back": "What is tense and unstable, needing to resolve?", "level": 1}, {"cat": "Harmony Potpourri", "front": "The common overall structure of most Soca and popular songs.", "back": "What is verse and chorus structure?", "level": 2}, {"cat": "Harmony Potpourri", "front": "What a natural (♮) sign does to a previous sharp or flat.", "back": "What is cancel it?", "level": 3}, {"cat": "Harmony Potpourri", "front": "Two notes played in succession create this kind of interval.", "back": "What is a melodic interval?", "level": 4}, {"cat": "Harmony Potpourri", "front": "The name given to the seventh degree of the scale.", "back": "What is the leading note?", "level": 5}];   // [{cat, front, back, level}]
const sfxRight=document.getElementById('sfxRight'), sfxWrong=document.getElementById('sfxWrong');

let useShuffle=true, muted=false;
let queue=[], total=0, mastered=0, attempts=0, firstTry=0, flipped=false, toughSet=null, toughFronts=new Set(), lastTough=[];

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function categories(){return [...new Set(CARDS.map(c=>c.cat))];}
function fillCatSelect(){
  const sel=document.getElementById('catSelect');
  sel.innerHTML='<option value="ALL">All categories ('+CARDS.length+')</option>'+
    categories().map(c=>{const n=CARDS.filter(x=>x.cat===c).length;return '<option value="'+c.replace(/"/g,'&quot;')+'">'+c+' ('+n+')</option>';}).join('');
}

function buildPool(){
  const cat=document.getElementById('catSelect').value;
  let pool = (toughSet ? toughSet : CARDS).filter(c=>cat==='ALL'||c.cat===cat);
  pool = pool.map(c=>({...c, attempts:0}));
  return useShuffle ? shuffle(pool) : pool;
}

function startSession(){
  const pool=buildPool();
  queue=pool; total=pool.length; mastered=0; attempts=0; firstTry=0; flipped=false;
  document.getElementById('summary').classList.remove('show');
  document.getElementById('stage').style.display='flex';
  document.getElementById('rate').classList.remove('show');
  if(total===0){ document.getElementById('frontText').textContent='No cards here'; document.getElementById('frontChip').textContent=''; updateProgress(); return; }
  showCard(); updateProgress();
}
function showCard(){
  flipped=false;
  const c=queue[0];
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('frontChip').textContent=c.cat;
  document.getElementById('frontText').textContent=c.front;
  document.getElementById('backText').textContent=c.back;
  document.getElementById('rate').classList.remove('show');
}
function flip(){
  if(!queue.length)return;
  flipped=!flipped;
  document.getElementById('card').classList.toggle('flipped',flipped);
  document.getElementById('rate').classList.toggle('show',flipped);
}
function rate(r){
  if(!flipped||!queue.length)return;
  const c=queue.shift(); c.attempts++; attempts++;
  if(r==='got'){ if(c.attempts===1)firstTry++; else toughFronts.add(c.front); mastered++; play(true); }
  else if(r==='near'){ toughFronts.add(c.front); insertBack(c, 5); play(null); }
  else { toughFronts.add(c.front); insertBack(c, 3); play(false); }
  updateProgress();
  if(queue.length===0){ showSummary(); }
  else showCard();
}
function insertBack(c, gap){ const pos=Math.min(queue.length, gap); queue.splice(pos,0,c); }

function updateProgress(){
  document.getElementById('mGo').textContent=queue.length;
  document.getElementById('mDone').textContent=mastered;
  document.getElementById('mTotal').textContent=total;
  const pct = total? Math.round((mastered/total)*100):0;
  document.getElementById('barFill').style.width=pct+'%';
}
function showSummary(){
  document.getElementById('stage').style.display='none';
  document.getElementById('rate').classList.remove('show');
  document.getElementById('sCards').textContent=mastered;
  document.getElementById('sFirst').textContent=(total?Math.round((firstTry/total)*100):0)+'%';
  document.getElementById('sAttempts').textContent=attempts;
  const acc = total?Math.round((firstTry/total)*100):0;
  document.getElementById('sumSub').textContent =
    acc>=90 ? 'Outstanding recall — you know this cold.' :
    acc>=70 ? 'Strong work. Run the tough cards once more to lock it in.' :
    acc>=40 ? 'Good progress. A second pass will push this higher.' :
              'Early days — keep drilling and watch the recall climb.';
  document.getElementById('summary').classList.add('show');
  lastTough = CARDS.filter(o=>toughFronts.has(o.front));
}

function studyTough(){
  if(!lastTough || lastTough.length===0){ toughSet=null; restart(); return; }
  toughSet=lastTough.slice();
  document.getElementById('catSelect').value='ALL';
  toughFronts=new Set();
  startSession();
}
function restart(){ toughSet=null; toughFronts=new Set(); startSession(); }
function toggleShuffle(){ useShuffle=!useShuffle; document.getElementById('shuffleBtn').classList.toggle('on',useShuffle); restart(); }
function toggleMute(){ muted=!muted; const b=document.getElementById('muteBtn'); b.textContent=muted?'🔇 Muted':'🔊 Sound'; b.classList.toggle('on',!muted); }
function play(correct){ if(muted||correct===null)return; const a=correct?sfxRight:sfxWrong; try{a.currentTime=0;a.play().catch(()=>{});}catch(e){} }

document.addEventListener('keydown',(e)=>{
  if(document.getElementById('summary').classList.contains('show'))return;
  if(e.key===' '){e.preventDefault();flip();}
  else if(flipped&&(e.key==='1'))rate('miss');
  else if(flipped&&(e.key==='2'))rate('near');
  else if(flipped&&(e.key==='3'))rate('got');
});

fillCatSelect();
startSession();
</script>
</body>
</html>
